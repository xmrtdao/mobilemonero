<svg width="64" height="64" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background: dark rounded square matching vizEngine amber palette -->
  <rect width="64" height="64" rx="14" fill="#0e0600"/>
  <rect width="64" height="64" rx="14" fill="url(#bg-grad)" opacity="0.6"/>

  <defs>
    <radialGradient id="bg-grad" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#ff8800" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#0e0600" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Concentric orbit rings (galaxy/campus metaphor) -->
  <circle cx="32" cy="32" r="10" fill="none" stroke="#ff6600" stroke-width="0.8" opacity="0.3"/>
  <circle cx="32" cy="32" r="17" fill="none" stroke="#ffaa00" stroke-width="0.6" opacity="0.25"/>
  <circle cx="32" cy="32" r="24" fill="none" stroke="#ff8800" stroke-width="0.5" opacity="0.18"/>

  <!-- Central core node (campus) -->
  <circle cx="32" cy="32" r="6" fill="#ff6600" opacity="0.2"/>
  <circle cx="32" cy="32" r="4" fill="#ff8800" opacity="0.5"/>
  <circle cx="32" cy="32" r="2" fill="#ffbb33"/>

  <!-- Agent nodes on rings -->
  <!-- Inner ring agents -->
  <circle cx="32" cy="22" r="1.8" fill="#44ffaa" opacity="0.8"/>
  <circle cx="39" cy="38" r="1.8" fill="#44ffaa" opacity="0.7"/>
  <circle cx="25" cy="38" r="1.8" fill="#44ffaa" opacity="0.7"/>

  <!-- Middle ring agents -->
  <circle cx="32" cy="15" r="1.4" fill="#00ffcc" opacity="0.6"/>
  <circle cx="49" cy="32" r="1.4" fill="#00ffcc" opacity="0.6"/>
  <circle cx="32" cy="49" r="1.4" fill="#00ffcc" opacity="0.6"/>
  <circle cx="15" cy="32" r="1.4" fill="#00ffcc" opacity="0.6"/>

  <!-- Outer ring (governance layer) -->
  <circle cx="44" cy="20" r="1.2" fill="#aa88ff" opacity="0.5"/>
  <circle cx="52" cy="36" r="1.2" fill="#aa88ff" opacity="0.5"/>
  <circle cx="44" cy="52" r="1.2" fill="#aa88ff" opacity="0.5"/>
  <circle cx="20" cy="52" r="1.2" fill="#aa88ff" opacity="0.5"/>
  <circle cx="12" cy="36" r="1.2" fill="#aa88ff" opacity="0.5"/>
  <circle cx="20" cy="20" r="1.2" fill="#aa88ff" opacity="0.5"/>

  <!-- Connection lines from core to inner agents -->
  <line x1="32" y1="32" x2="32" y2="22" stroke="#ff6600" stroke-width="0.4" opacity="0.3"/>
  <line x1="32" y1="32" x2="39" y2="38" stroke="#ff6600" stroke-width="0.4" opacity="0.3"/>
  <line x1="32" y1="32" x2="25" y2="38" stroke="#ff6600" stroke-width="0.4" opacity="0.3"/>

  <!-- Cross-vault dashed connection -->
  <line x1="39" y1="38" x2="44" y2="52" stroke="#ffdd44" stroke-width="0.3" opacity="0.4" stroke-dasharray="1,1.5"/>
  <line x1="25" y1="38" x2="20" y2="52" stroke="#ffdd44" stroke-width="0.3" opacity="0.4" stroke-dasharray="1,1.5"/>
</svg>