<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zero-Claw Chat — Encrypted Attorney-Client Communications</title>
    <meta name="description" content="Zero-knowledge encrypted chat for attorney-client privilege. E2E encryption, no logs, can't be subpoenaed.">
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        :root {
            --bg-primary: #030303;
            --bg-card: rgba(255, 255, 255, 0.03);
            --border: rgba(255, 102, 0, 0.2);
            --accent: #ff6600;
            --accent-glow: rgba(255, 102, 0, 0.3);
            --text-primary: #e8e8e8;
            --text-secondary: #888;
            --success: #22c55e;
            --error: #ef4444;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
        
        /* Header */
        header {
            padding: 1rem 2rem;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(3, 3, 3, 0.8);
            backdrop-filter: blur(12px);
        }
        
        .logo {
            font-size: 1.25rem;
            font-weight: 700;
            color: var(--accent);
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        
        .logo span { color: var(--text-primary); }
        
        .status-badge {
            padding: 0.25rem 0.75rem;
            border-radius: 999px;
            font-size: 0.75rem;
            font-weight: 600;
            background: var(--bg-card);
            border: 1px solid var(--border);
        }
        
        .status-badge.connected {
            background: rgba(34, 197, 94, 0.1);
            border-color: var(--success);
            color: var(--success);
        }
        
        /* Main Chat Area */
        main {
            flex: 1;
            display: flex;
            max-width: 1200px;
            margin: 0 auto;
            width: 100%;
            padding: 1rem;
            gap: 1rem;
        }
        
        /* Connection Panel */
        .connection-panel {
            width: 320px;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 1.5rem;
            height: fit-content;
        }
        
        .connection-panel h2 {
            font-size: 1rem;
            margin-bottom: 1rem;
            color: var(--accent);
        }
        
        .form-group {
            margin-bottom: 1rem;
        }
        
        .form-group label {
            display: block;
            font-size: 0.875rem;
            color: var(--text-secondary);
            margin-bottom: 0.5rem;
        }
        
        .form-group input {
            width: 100%;
            padding: 0.75rem;
            background: var(--bg-primary);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text-primary);
            font-size: 0.875rem;
        }
        
        .form-group input:focus {
            outline: none;
            border-color: var(--accent);
        }
        
        .btn {
            width: 100%;
            padding: 0.75rem 1rem;
            border-radius: 8px;
            font-size: 0.875rem;
            font-weight: 600;
            cursor: pointer;
            border: none;
            transition: all 0.2s;
        }
        
        .btn-primary {
            background: var(--accent);
            color: #000;
        }
        
        .btn-primary:hover {
            background: #ff8533;
            transform: translateY(-1px);
        }
        
        .btn-danger {
            background: var(--error);
            color: #fff;
            margin-top: 0.5rem;
        }
        
        /* Chat Area */
        .chat-container {
            flex: 1;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 12px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        
        .chat-header {
            padding: 1rem 1.5rem;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .chat-header h2 {
            font-size: 1rem;
            color: var(--text-primary);
        }
        
        .room-info {
            font-size: 0.875rem;
            color: var(--text-secondary);
        }
        
        .messages {
            flex: 1;
            overflow-y: auto;
            padding: 1.5rem;
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
        }
        
        .message {
            max-width: 70%;
            padding: 0.75rem 1rem;
            border-radius: 12px;
            background: var(--bg-primary);
            border: 1px solid var(--border);
        }
        
        .message.own {
            align-self: flex-end;
            background: rgba(255, 102, 0, 0.1);
            border-color: var(--accent);
        }
        
        .message-header {
            font-size: 0.75rem;
            color: var(--text-secondary);
            margin-bottom: 0.25rem;
            display: flex;
            justify-content: space-between;
            gap: 1rem;
        }
        
        .message-content {
            font-size: 0.875rem;
            line-height: 1.5;
            word-wrap: break-word;
        }
        
        .system-message {
            text-align: center;
            font-size: 0.75rem;
            color: var(--text-secondary);
            padding: 0.5rem;
        }
        
        .message-input {
            padding: 1rem 1.5rem;
            border-top: 1px solid var(--border);
            display: flex;
            gap: 0.75rem;
        }
        
        .message-input input {
            flex: 1;
            padding: 0.75rem 1rem;
            background: var(--bg-primary);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text-primary);
            font-size: 0.875rem;
        }
        
        .message-input input:focus {
            outline: none;
            border-color: var(--accent);
        }
        
        .message-input button {
            padding: 0.75rem 1.5rem;
            background: var(--accent);
            color: #000;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .message-input button:hover {
            background: #ff8533;
        }
        
        .message-input button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        
        /* Encryption Badge */
        .encryption-badge {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 0.75rem;
            color: var(--text-secondary);
            padding: 0.5rem 1rem;
            background: var(--bg-primary);
            border-radius: 8px;
            margin-top: 1rem;
        }
        
        .encryption-badge svg {
            width: 1rem;
            height: 1rem;
            color: var(--success);
        }
        
        /* Responsive */
        @media (max-width: 768px) {
            main {
                flex-direction: column;
            }
            
            .connection-panel {
                width: 100%;
            }
            
            .message {
                max-width: 85%;
            }
        }
    </style>
</head>
<body>
    <header>
        <a href="/" class="logo">
        <header>
            <a href="/" class="logo">🔐 <span>Zero-Claw Chat</span></a>
            <div class="status-badge" id="status-badge">Disconnected</div>
        </header>
        
        <nav style="background: var(--bg-card); border-bottom: 1px solid var(--border); padding: 0.75rem 2rem; display: flex; gap: 1rem; justify-content: center;">
            <a href="/zero-claw/" style="color: var(--accent); text-decoration: none; font-weight: 600;">💬 Chat</a>
            <a href="/zero-claw/create-room.html" style="color: var(--text-primary); text-decoration: none;">🏠 Create Room</a>
            <a href="/zero-claw/paperhawk.html" style="color: var(--text-primary); text-decoration: none;">🦅 Document Audit</a>
        </nav>
    
    <main>
        <!-- Connection Panel -->
        <div class="connection-panel" id="connection-panel">
            <h2>Connect to Encrypted Room</h2>
            
            <div class="form-group">
                <label>Relay Server</label>
                <input type="text" id="relay-url" value="wss://chat.mobilemonero.com" placeholder="wss://...">
            </div>
            
            <div class="form-group">
                <label>Your Email</label>
                <input type="email" id="username" placeholder="attorney@lawfirm.com">
            </div>
            
            <div class="form-group">
                <label>Case/Room ID</label>
                <input type="text" id="room-id" placeholder="case-123" value="case-123">
            </div>
            
            <div class="form-group">
                <label>Shared Secret Password</label>
                <input type="password" id="password" placeholder="Enter shared secret">
            </div>
            
            <button class="btn btn-primary" onclick="connect()">Connect</button>
            
            <div class="encryption-badge">
                <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"/>
                </svg>
                <span>E2E Encrypted • Server Cannot Read</span>
            </div>
        </div>
        
        <!-- Chat Container -->
        <div class="chat-container" id="chat-container" style="opacity: 0.5; pointer-events: none;">
            <div class="chat-header">
                <div>
                    <h2 id="chat-room-title">Room: case-123</h2>
                    <div class="room-info" id="room-info">Waiting for connection...</div>
                </div>
            </div>
            
            <div class="messages" id="messages">
                <div class="system-message">Connect to start encrypted chat</div>
            </div>
            
            <div class="message-input">
                <input type="text" id="message-input" placeholder="Type encrypted message..." disabled onkeypress="if(event.key==='Enter') sendMessage()">
                <button onclick="sendMessage()" id="send-btn" disabled>Send</button>
            </div>
        </div>
    </main>
    
    <script>
        // Encryption module (HKDF + AES-like)
        class EncryptionManager {
            constructor(masterSecret) {
                this.masterSecret = masterSecret;
                this.roomKeys = new Map();
            }
            
            async deriveRoomKey(roomId) {
                if (this.roomKeys.has(roomId)) return this.roomKeys.get(roomId);
                
                const enc = new TextEncoder();
                const keyData = await crypto.subtle.importKey(
                    'raw', enc.encode(this.masterSecret), 'PBKDF2', false, ['deriveKey']
                );
                
                const roomKey = await crypto.subtle.deriveKey(
                    {
                        name: 'PBKDF2',
                        salt: enc.encode(roomId),
                        iterations: 100000,
                        hash: 'SHA-256'
                    },
                    keyData,
                    { name: 'AES-GCM', length: 256 },
                    false,
                    ['encrypt', 'decrypt']
                );
                
                this.roomKeys.set(roomId, roomKey);
                return roomKey;
            }
            
            async encryptMessage(roomId, message) {
                const key = await this.deriveRoomKey(roomId);
                const enc = new TextEncoder();
                const iv = crypto.getRandomValues(new Uint8Array(12));
                
                const ciphertext = await crypto.subtle.encrypt(
                    { name: 'AES-GCM', iv },
                    key,
                    enc.encode(JSON.stringify(message))
                );
                
                const blob = new Uint8Array(iv.length + ciphertext.byteLength);
                blob.set(iv, 0);
                blob.set(new Uint8Array(ciphertext), iv.length);
                
                return btoa(String.fromCharCode(...blob));
            }
            
            async decryptMessage(roomId, ciphertextB64) {
                const key = await this.deriveRoomKey(roomId);
                const blob = Uint8Array.from(atob(ciphertextB64), c => c.charCodeAt(0));
                
                const iv = blob.slice(0, 12);
                const ciphertext = blob.slice(12);
                
                const plaintext = await crypto.subtle.decrypt(
                    { name: 'AES-GCM', iv },
                    key,
                    ciphertext
                );
                
                return JSON.parse(new TextDecoder().decode(plaintext));
            }
            
            wipe() {
                this.roomKeys.clear();
            }
        }
        
        // Global state
        let ws = null;
        let encryption = null;
        let username = null;
        let roomId = null;
        
        // UI Elements
        const statusEl = document.getElementById('status');
        const messagesEl = document.getElementById('messages');
        const messageInput = document.getElementById('message-input');
        const sendBtn = document.getElementById('send-btn');
        const chatContainer = document.getElementById('chat-container');
        
        function addMessage(content, isOwn = false, isSystem = false) {
            if (isSystem) {
                const div = document.createElement('div');
                div.className = 'system-message';
                div.textContent = content;
                messagesEl.appendChild(div);
                messagesEl.scrollTop = messagesEl.scrollHeight;
                return;
            }
            
            const div = document.createElement('div');
            div.className = `message ${isOwn ? 'own' : ''}`;
            div.innerHTML = `
                <div class="message-header">
                    <span>${isOwn ? 'You' : content.from}</span>
                    <span>${new Date(content.timestamp).toLocaleTimeString()}</span>
                </div>
                <div class="message-content">${escapeHtml(content.content)}</div>
            `;
            messagesEl.appendChild(div);
            messagesEl.scrollTop = messagesEl.scrollHeight;
        }
        
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        async function connect() {
            const relayUrl = document.getElementById('relay-url').value;
            const user = document.getElementById('username').value;
            const room = document.getElementById('room-id').value;
            const password = document.getElementById('password').value;
            
            if (!user || !room || !password) {
                alert('Please fill in all fields');
                return;
            }
            
            try {
                ws = new WebSocket(relayUrl);
                
                ws.onopen = async () => {
                    console.log('Connected to relay');
                    
                    // Register
                    ws.send(JSON.stringify({
                        type: 'register',
                        username: user,
                        room_id: room
                    }));
                    
                    // Initialize encryption
                    encryption = new EncryptionManager(password);
                    username = user;
                    roomId = room;
                    
                    // Update UI
                    statusEl.textContent = 'Connected';
                    statusEl.classList.add('connected');
                    document.getElementById('chat-room-title').textContent = `Room: ${room}`;
                    document.getElementById('room-info').textContent = `Logged in as ${user}`;
                    chatContainer.style.opacity = '1';
                    chatContainer.style.pointerEvents = 'auto';
                    messageInput.disabled = false;
                    sendBtn.disabled = false;
                    
                    addMessage('Connected to encrypted room', false, true);
                };
                
                ws.onmessage = async (event) => {
                    const data = JSON.parse(event.data);
                    
                    if (data.type === 'registered') {
                        addMessage('Successfully registered in room', false, true);
                    } else if (data.type === 'message') {
                        try {
                            const decrypted = await encryption.decryptMessage(roomId, data.ciphertext);
                            const isOwn = data.from === username;
                            addMessage(decrypted, isOwn);
                        } catch (e) {
                            console.error('Decryption failed:', e);
                            addMessage('⚠️ Decryption failed', false, true);
                        }
                    } else if (data.type === 'user_joined') {
                        addMessage(`${data.username} joined the room`, false, true);
                    } else if (data.type === 'user_left') {
                        addMessage(`${data.username} left the room`, false, true);
                    }
                };
                
                ws.onclose = () => {
                    statusEl.textContent = 'Disconnected';
                    statusEl.classList.remove('connected');
                    chatContainer.style.opacity = '0.5';
                    chatContainer.style.pointerEvents = 'none';
                    messageInput.disabled = true;
                    sendBtn.disabled = true;
                    addMessage('Disconnected from server', false, true);
                    
                    if (encryption) encryption.wipe();
                };
                
                ws.onerror = (e) => {
                    console.error('WebSocket error:', e);
                    addMessage('Connection error', false, true);
                };
                
            } catch (e) {
                alert('Connection failed: ' + e.message);
            }
        }
        
        async function sendMessage() {
            const content = messageInput.value.trim();
            if (!content || !ws || ws.readyState !== WebSocket.OPEN) return;
            
            try {
                const message = {
                    from: username,
                    content: content,
                    type: 'chat'
                };
                
                const ciphertext = await encryption.encryptMessage(roomId, message);
                
                ws.send(JSON.stringify({
                    type: 'message',
                    ciphertext: ciphertext
                }));
                
                messageInput.value = '';
                
            } catch (e) {
                console.error('Encryption failed:', e);
                alert('Encryption failed');
            }
        }
    </script>
</body>
</html>
