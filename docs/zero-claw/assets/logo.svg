<!-- Zero-Claw Logo - SVG -->
<svg viewBox="0 0 400 120" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Gold Gradient -->
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#D4AF37;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#FFD700;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#B8860B;stop-opacity:1" />
    </linearGradient>
    
    <!-- Shield Gradient -->
    <linearGradient id="shieldGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0f0f1a;stop-opacity:1" />
    </linearGradient>
    
    <!-- Glow Filter -->
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Shield Background -->
  <path d="M 60 10 L 140 10 L 150 20 L 150 70 Q 150 100 100 115 Q 50 100 50 70 L 50 20 Z" 
        fill="url(#shieldGrad)" stroke="url(#goldGrad)" stroke-width="3"/>
  
  <!-- Eagle Wings (stylized) -->
  <path d="M 65 35 Q 45 25 40 40 Q 50 45 65 40" fill="url(#goldGrad)" opacity="0.8"/>
  <path d="M 135 35 Q 155 25 160 40 Q 150 45 135 40" fill="url(#goldGrad)" opacity="0.8"/>
  
  <!-- Eagle Body (abstract) -->
  <path d="M 90 30 L 100 55 L 110 30" fill="none" stroke="url(#goldGrad)" stroke-width="2.5" stroke-linecap="round"/>
  
  <!-- Lock Symbol (center) -->
  <rect x="92" y="45" width="16" height="14" rx="2" fill="none" stroke="url(#goldGrad)" stroke-width="2"/>
  <path d="M 95 45 L 95 40 Q 95 37 98 37 Q 101 37 101 40 L 101 45" fill="none" stroke="url(#goldGrad)" stroke-width="2" stroke-linecap="round"/>
  <circle cx="98" cy="50" r="2" fill="url(#goldGrad)"/>
  
  <!-- Text: ZERO-CLAW -->
  <text x="175" y="55" font-family="'Georgia', 'Times New Roman', serif" font-size="32" font-weight="bold" 
        fill="url(#goldGrad)" letter-spacing="4">ZERO-CLAW</text>
  
  <!-- Tagline -->
  <text x="175" y="78" font-family="'Georgia', 'Times New Roman', serif" font-size="11" 
        fill="#8B7355" letter-spacing="2">ATTORNEY-CLIENT PRIVILEGED COMMUNICATIONS</text>
  
  <!-- Decorative Line -->
  <line x1="175" y1="85" x2="385" y2="85" stroke="url(#goldGrad)" stroke-width="1" opacity="0.5"/>
  <circle cx="175" cy="85" r="2" fill="url(#goldGrad)"/>
  <circle cx="385" cy="85" r="2" fill="url(#goldGrad)"/>
</svg>
