name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install deps
        run: npm install

      - name: Lint
        run: npm run lint || true

      - name: Type check
        run: npx tsc --noEmit || true

      - name: Build
        run: npm run build

      - name: Validate Dockerfile
        run: docker build -t mobilemonero:test . || true
        timeout-minutes: 5

      - name: Validate README exists
        run: test -f README.md && echo "README OK"

      - name: Check HF Space link badge
        run: grep -q "huggingface.co/spaces/XMRTDAO/mobilemonero" README.md && echo "HF badge OK" || echo "HF badge check failed"
