name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci || npm install
        continue-on-error: true

      - name: Lint (optional)
        run: npm run lint || echo "Lint skipped - no ESLint config"
        continue-on-error: true

      - name: Type check (optional)
        run: npx tsc --noEmit || echo "Type check skipped"
        continue-on-error: true

      - name: Validate README exists
        run: |
          if [ -f README.md ]; then
            echo "✅ README.md found"
          else
            echo "❌ README.md missing"
            exit 1
          fi

      - name: Validate docs directory
        run: |
          if [ -d docs ]; then
            echo "✅ docs/ directory found ($(ls docs | wc -l) files)"
          else
            echo "❌ docs/ directory missing"
            exit 1
          fi

      - name: Check Markdown files
        run: |
          md_count=$(find . -maxdepth 1 -name "*.md" | wc -l)
          echo "✅ Found $md_count markdown files in root"
          if [ "$md_count" -lt 1 ]; then
            echo "❌ No markdown files found"
            exit 1
          fi

      - name: Validate GitHub Actions workflows
        run: |
          if [ -d .github/workflows ]; then
            workflow_count=$(ls .github/workflows/*.yml 2>/dev/null | wc -l)
            echo "✅ Found $workflow_count workflow files"
          else
            echo "⚠️ No .github/workflows directory"
          fi

      - name: Check HF Space link in README
        run: |
          if grep -q "huggingface.co" README.md 2>/dev/null; then
            echo "✅ Hugging Face link found in README"
          else
            echo "⚠️ No Hugging Face link in README (optional)"
          fi

      - name: Summary
        run: |
          echo ""
          echo "==================================="
          echo "✅ CI Validation Complete"
          echo "==================================="
          echo "Repository: xmrtdao/mobilemonero"
          echo "Branch: ${{ github.ref_name }}"
          echo "Commit: ${{ github.sha }}"
          echo ""
