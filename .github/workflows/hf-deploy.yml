name: Deploy to Hugging Face Space

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: hf-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Hugging Face Hub
        run: pip install -q huggingface-hub

      - name: Push to HF Space (Docker)
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          python3 -c "
import os
from huggingface_hub import HfApi
api = HfApi(token=os.environ['HF_TOKEN'])
api.upload_folder(
    folder_path='.',
    repo_id='XMRTDAO/mobilemonero',
    repo_type='space',
    ignore_patterns=['.git/*', '.github/*', 'node_modules/*', 'dist/*', 'README.md']
)
print('Deployed to HF Space')
          "

      - name: Verify Deployment
        run: |
          sleep 10
          curl -s -o /dev/null -w "%{http_code}" https://huggingface.co/spaces/XMRTDAO/mobilemonero | grep -q "200\|301\|302" && echo "Space OK" || echo "Space check failed"
