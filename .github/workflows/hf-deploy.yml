name: Deploy to Hugging Face Space

on:
  push:
    branches: [main]
    paths:
      - 'deploy/huggingface-space/**'
      - '.github/workflows/hf-deploy.yml'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Hugging Face Hub
        run: pip install -q huggingface-hub

      - name: Authenticate with HF
        run: |
          mkdir -p ~/.cache/huggingface
          echo "{"token": "${{ secrets.HF_TOKEN }}"}" > ~/.cache/huggingface/token

      - name: Push to HF Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          python3 -c "
import os
from huggingface_hub import HfApi
api = HfApi(token=os.environ['HF_TOKEN'])
api.upload_folder(
    folder_path='deploy/huggingface-space',
    repo_id='XMRTDAO/mobilemonero',
    repo_type='space'
)
print('Deployed to HF Space')
          "

      - name: Verify Deployment
        run: |
          sleep 5
          curl -s -o /dev/null -w "%{http_code}" https://huggingface.co/spaces/XMRTDAO/mobilemonero | grep -q "200\|301" && echo "Space OK" || echo "Space check failed"
