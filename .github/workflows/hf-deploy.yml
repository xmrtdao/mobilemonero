name: Deploy to Hugging Face Space

on:
  push:
    branches: [main]
    paths:
      - 'Dockerfile'
      - '.dockerignore'
      - 'package.json'
      - 'package-lock.json'
      - 'index.html'
      - 'vite.config.ts'
      - 'src/**'
      - 'public/**'
      - 'tsconfig.json'
      - 'tailwind.config.*'
      - 'postcss.config.*'
  workflow_dispatch:

concurrency:
  group: hf-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Push to HF Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          git remote add hf https://token:${HF_TOKEN}@huggingface.co/spaces/XMRTDAO/mobilemonero
          git filter-branch --force --index-filter 'git rm -rf --cached --ignore-unmatch .github/' HEAD
          git push --force hf main:main
          echo "Deployed to HF Space"
